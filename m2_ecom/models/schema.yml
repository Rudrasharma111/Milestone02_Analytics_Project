version: 2

models:
  - name: stg_orders
    columns:
      - name: unique_order_key
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]

  - name: stg_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]

  - name: stg_products
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_campaigns
    columns:
      - name: campaign_id
        tests: [unique, not_null]

  - name: int_orders
    columns:
      - name: unique_order_key
        tests: [unique, not_null]

  - name: dim_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_name
        tests: [not_null]

  - name: dim_products
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: subcategory
        tests: [not_null]

  - name: dim_campaigns
    columns:
      - name: campaign_id
        tests: [unique, not_null]

  - name: dim_date
    columns:
      - name: full_date
        tests: [unique, not_null]

  - name: fct_orders
    columns:
      - name: unique_order_key
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id