version: 2

# ==========================================
# 1. SEMANTIC MODEL (The Engine)
# ==========================================
semantic_models:
  - name: sm_fct_orders
    description: "Semantic model for e-commerce orders"
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: order_date
    
    entities:
      - name: unique_order_key  # Yeh hamari asli row-level unique ID hai
        type: primary
      - name: order_id
        type: foreign
      - name: customer_id
        type: foreign
      - name: product_id
        type: foreign
        
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: order_status
        type: categorical
        
    measures:
      - name: sum_total_amount
        description: "Gross total amount sum"
        agg: sum
        expr: total_amount
        
      - name: count_unique_orders
        description: "Distinct count of orders"
        agg: count_distinct
        expr: order_id
        
      - name: sum_quantity
        description: "Total items purchased"
        agg: sum
        expr: quantity
        
      - name: count_unique_customers
        description: "Distinct count of customers"
        agg: count_distinct
        expr: customer_id

      # MACRO KE HISAAB SE SAB UPPERCASE KAR DIYA HAI
      - name: sum_gmv_amount
        description: "Total amount excluding cancelled orders"
        agg: sum
        expr: "CASE WHEN order_status != 'CANCELLED' THEN total_amount ELSE 0 END"

      - name: count_delivered_orders
        description: "Count of delivered orders"
        agg: count_distinct
        expr: "CASE WHEN order_status = 'DELIVERED' THEN order_id ELSE NULL END"

      - name: count_returned_orders
        description: "Count of returned orders"
        agg: count_distinct
        expr: "CASE WHEN order_status = 'RETURNED' THEN order_id ELSE NULL END"

      - name: count_cancelled_orders
        description: "Count of cancelled orders"
        agg: count_distinct
        expr: "CASE WHEN order_status = 'CANCELLED' THEN order_id ELSE NULL END"

# ==========================================
# 2. METRICS (The Business KPIs)
# ==========================================
metrics:
  # --- A. REVENUE METRICS ---
  - name: total_revenue
    label: "Total Net Revenue"
    description: "The total net revenue generated across all orders."
    type: simple
    type_params:
      measure: sum_total_amount

  - name: gross_merchandise_value
    label: "GMV"
    description: "Total value of merchandise sold, excluding cancelled."
    type: simple
    type_params:
      measure: sum_gmv_amount

  - name: average_order_value
    label: "Average Order Value (AOV)"
    description: "Average revenue generated per unique customer order."
    type: derived
    type_params:
      expr: "total_revenue / nullif(total_orders, 0)"
      metrics:
        - name: total_revenue
        - name: total_orders

  # --- B. VOLUME & CART METRICS ---
  - name: total_orders
    label: "Total Orders"
    description: "Count of unique orders placed by customers."
    type: simple
    type_params:
      measure: count_unique_orders

  - name: total_items_sold
    label: "Total Items Sold"
    description: "Total volume of individual products sold."
    type: simple
    type_params:
      measure: sum_quantity

  - name: units_per_transaction
    label: "Units Per Transaction (UPT)"
    description: "Average number of items purchased in a single order."
    type: derived
    type_params:
      expr: "total_items_sold / nullif(total_orders, 0)"
      metrics:
        - name: total_items_sold
        - name: total_orders

  # --- C. CUSTOMER METRICS ---
  - name: active_customers
    label: "Active Customers"
    description: "Count of unique customers who placed an order."
    type: simple
    type_params:
      measure: count_unique_customers

  - name: average_revenue_per_user
    label: "ARPU"
    description: "Total revenue divided by the number of active customers."
    type: derived
    type_params:
      expr: "total_revenue / nullif(active_customers, 0)"
      metrics:
        - name: total_revenue
        - name: active_customers

  # --- D. OPERATIONAL METRICS ---
  - name: delivered_orders
    label: "Delivered Orders"
    type: simple
    type_params:
      measure: count_delivered_orders

  - name: returned_orders
    label: "Returned Orders"
    type: simple
    type_params:
      measure: count_returned_orders

  - name: cancelled_orders
    label: "Cancelled Orders"
    type: simple
    type_params:
      measure: count_cancelled_orders

  - name: return_rate_pct
    label: "Return Rate (%)"
    description: "Percentage of orders that get returned."
    type: derived
    type_params:
      expr: "(returned_orders * 100.0) / nullif(total_orders, 0)"
      metrics:
        - name: returned_orders
        - name: total_orders

  # --- E. STRETCH GOAL METRIC (Time-Based) ---
  - name: mom_revenue_growth
    label: "MoM Revenue Growth"
    description: "Month-over-Month growth percentage of total revenue."
    type: derived
    type_params:
      expr: "(total_revenue - total_revenue_last_month) / nullif(total_revenue_last_month, 0)"
      metrics:
        - name: total_revenue
        - name: total_revenue
          alias: total_revenue_last_month
          offset_window: 1 month