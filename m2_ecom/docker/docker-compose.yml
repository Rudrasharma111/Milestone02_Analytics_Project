services:
  postgres:
    image: postgres:15
    container_name: m2_analytics_db
    restart: always 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: m2_analytics_db
    ports:
      - "5434:5432"  
    volumes:
      - m2_pgdata:/var/lib/postgresql/data

volumes:
  m2_pgdata: